name: leadora
description: Leadora - AI-powered sales operating system for lead generation, outreach, CRM, automations and business growth.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  # Navigation
  go_router: ^14.2.0

  # State management
  flutter_riverpod: ^2.5.1

  # UI & Charts
  fl_chart: ^0.68.0

  # Utilities
  google_fonts: ^6.2.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/

  # Fonts: Inter is referenced in code but served via Google Fonts at runtime.
  # Add local font assets here if bundling offline.
